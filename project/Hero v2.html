<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Meridian — Hero v2 (canvas flythrough)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,300;9..144,0,400;9..144,1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #ece7df;
    --bg-rgb: 236, 231, 223;
    --ink: #1a1916;
    --ink-rgb: 26, 25, 22;
    --ink-muted: #6b665d;
    --rule: rgba(26, 25, 22, 0.18);
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { background: var(--bg); }
  body {
    font-family: "Fraunces", Georgia, serif;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; letter-spacing: 0.02em; }
  a { color: inherit; text-decoration: none; }
  #root { min-height: 100vh; }

  /* ---------- CTA buttons ---------- */
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 22px;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 2px;
    transition: transform 220ms cubic-bezier(.2,.7,.2,1),
                background-color 220ms ease,
                color 220ms ease,
                border-color 220ms ease,
                box-shadow 220ms ease;
    will-change: transform;
    cursor: pointer;
    user-select: none;
  }
  .cta:active { transform: translateY(1px); }
  .cta-arrow {
    display: inline-block;
    transition: transform 280ms cubic-bezier(.2,.7,.2,1);
  }
  .cta:hover .cta-arrow { transform: translateX(4px); }

  .cta-primary {
    background: var(--ink);
    color: var(--bg);
    border: 1px solid var(--ink);
    box-shadow: 0 14px 30px -16px rgba(var(--ink-rgb), 0.55);
  }
  .cta-primary:hover {
    background: rgba(var(--ink-rgb), 0.88);
    box-shadow: 0 18px 40px -16px rgba(var(--ink-rgb), 0.7);
  }

  .cta-secondary {
    background: transparent;
    color: var(--ink);
    border: 1px solid rgba(var(--ink-rgb), 0.35);
  }
  .cta-secondary:hover {
    border-color: var(--ink);
    background: rgba(var(--ink-rgb), 0.06);
  }

  /* ---------- Pause toggle hover ---------- */
  .play-toggle { transition: border-color 200ms ease, background 200ms ease; }
  .play-toggle:hover { border-color: var(--ink); background: rgba(var(--ink-rgb), 0.06); }
</style>
</head>
<body>
<div id="root"></div>

<script type="application/json" id="tweak-defaults">
/*EDITMODE-BEGIN*/{
  "tone": "paper",
  "speed": 0.95,
  "density": 8,
  "spread": 1.5,
  "cardSize": 0.4,
  "showCounter": true,
  "showPlateLabels": true,
  "perspective": "flat"
}/*EDITMODE-END*/
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="hero-v2.jsx"></script>
<script type="text/babel" src="app-v2.jsx"></script>
</body>
</html>
